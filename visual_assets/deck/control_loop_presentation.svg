<g stroke="#2b2b2b" stroke-width="3" fill="none" marker-end="url(#arrow)">
  <line x1="310" y1="245" x2="390" y2="245"/>
  <line x1="670" y1="245" x2="760" y2="170"/>
  <line x1="670" y1="245" x2="760" y2="298"/>
  <line x1="1060" y1="298" x2="1160" y2="245"/>
